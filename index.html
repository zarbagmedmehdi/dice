    <style>
        body {
            font-family: 'Tajawal', sans-serif;
            background-color: #f8fafc;
        }

        /* INCREASED LINE HEIGHT HERE */
        .quran-text {
            font-family: 'Amiri', serif;
            line-height: 2.8;
            /* Increased from 2.2 for better clarity */
            word-spacing: 2px;
        }

        .active-cat {
            background-color: #ecfdf5;
            color: #059669;
            border-right: 4px solid #059669;
            font-weight: bold;
        }

        #menu-list::-webkit-scrollbar {
            width: 4px;
        }

        #menu-list::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 10px;
        }
    </style>
</head>

<body class="text-slate-900 min-h-screen">

    <header class="bg-emerald-700 text-white p-4 sticky top-0 z-50 shadow-md">
        <div class="container mx-auto flex justify-between items-center">
            <div class="flex items-center gap-4">
                <button onclick="toggleSidebar()"
                    class="md:hidden p-2 hover:bg-emerald-800 rounded-lg transition-colors">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24"
                        stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M4 6h16M4 12h16M4 18h16" />
                    </svg>
                </button>
                <h1 class="text-xl font-bold">حصن المسلم</h1>
            </div>
            <div id="category-badge" class="bg-emerald-800 px-4 py-1 rounded-full text-xs font-medium">تحميل...</div>
        </div>
    </header>

    <div class="container mx-auto px-4 py-6 flex flex-col md:flex-row gap-6">
        <aside id="sidebar" class="hidden md:block fixed md:relative inset-0 z-40 md:z-auto">
            <div onclick="toggleSidebar()" class="md:hidden fixed inset-0 bg-black/50"></div>
            <div
                class="relative bg-white h-full md:h-auto w-3/4 md:w-64 lg:w-72 shadow-2xl md:shadow-sm border border-slate-200 flex flex-col rounded-l-none md:rounded-2xl overflow-hidden sticky top-24">
                <div class="p-4 bg-slate-50 border-b flex justify-between items-center">
                    <span class="font-bold text-slate-700">الأقسام</span>
                    <button onclick="toggleSidebar()" class="md:hidden text-slate-400 text-xl">&times;</button>
                </div>
                <div class="p-2 border-b">
                    <input type="text" id="search-input" onkeyup="filterCategories()" placeholder="بحث في الأقسام..."
                        class="w-full p-2 text-sm border rounded-lg focus:outline-emerald-500">
                </div>
                <ul id="menu-list"
                    class="divide-y divide-slate-100 overflow-y-auto h-[calc(100vh-180px)] md:max-h-[60vh]"></ul>
            </div>
        </aside>

        <main class="flex-1">
            <div id="adkar-display" class="space-y-4">
                <div class="flex justify-center py-20">
                    <div class="animate-spin rounded-full h-10 w-10 border-b-2 border-emerald-700"></div>
                </div>
            </div>
        </main>
    </div>

    <script src="adhkar.js"></script>

    <script>
        let adkarList = [];

        function init() {
            if (typeof adkarData !== 'undefined') {
                // Flattening nested array
                adkarList = Array.isArray(adkarData[0]) ? adkarData[0] : adkarData;
                renderMenu(adkarList);
                if (adkarList.length > 0) showCategory(adkarList[0].id);
            }
        }

        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('hidden');
        }

        function filterCategories() {
            const input = document.getElementById('search-input').value.toLowerCase();
            const filtered = adkarList.filter(c => c.category.toLowerCase().includes(input));
            renderMenu(filtered);
        }

        function renderMenu(data) {
            const menu = document.getElementById('menu-list');
            menu.innerHTML = data.map(cat => `
                <li onclick="showCategory(${cat.id})" id="btn-${cat.id}" 
                    class="menu-item p-4 cursor-pointer hover:bg-emerald-50 transition-all text-sm text-slate-600 border-r-4 border-transparent">
                    ${cat.category}
                </li>
            `).join('');
        }

        function showCategory(id) {
            const category = adkarList.find(c => c.id === id);
            const container = document.getElementById('adkar-display');
            const badge = document.getElementById('category-badge');
            if (!category) return;

            badge.textContent = category.category;
            document.querySelectorAll('.menu-item').forEach(el => el.classList.remove('active-cat'));
            const activeBtn = document.getElementById(`btn-${id}`);
            if (activeBtn) activeBtn.classList.add('active-cat');

            // Template literal with fixed syntax and improved line height
            container.innerHTML = category.array.map((item) => `
                <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200 transition-all hover:border-emerald-200">
                    <p class="quran-text text-right text-xl text-slate-800 mb-6" dir="rtl">${item.text}</p>
                    <div class="flex flex-wrap justify-between items-center gap-4 border-t pt-4">
                        <div class="flex items-center gap-3">
                            <!--

                            <button onclick="playAudio('${item.audio}')" class="w-10 h-10 flex items-center justify-center rounded-full bg-emerald-100 text-emerald-600">
                                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" class="w-5 h-5">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.536 8.464a5 5 0 010 7.072m2.828-9.9a9 9 0 010 12.728M5.586 15H4a1 1 0 01-1-1v-4a1 1 0 011-1h1.586l4.707-4.707C10.923 3.663 12 4.109 12 5v14c0 .891-1.077 1.337-1.707.707L5.586 15z" />
                                </svg>
                            </button>
                            -->

                            <span class="text-xs text-slate-400 font-bold uppercase">التكرار: ${item.count}</span>
                        </div>
                        <button onclick="handleCount(this)" class="bg-emerald-600 text-white px-8 py-2 rounded-xl font-bold transition-all active:scale-95">
                            ${item.count}
                        </button>
                    </div>
                </div>
            `).join('');

            if (window.innerWidth < 768) toggleSidebar();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function handleCount(btn) {
            let current = parseInt(btn.textContent);
            if (current > 1) {
                btn.textContent = current - 1;
            } else {
                btn.textContent = "✓ تم";
                btn.classList.replace('bg-emerald-600', 'bg-slate-400');
                btn.disabled = true;
                btn.closest('.bg-white').style.opacity = "0.7";
            }
        }

        function playAudio(url) {
            if (!url || url === 'undefined') return;
            new Audio(url).play().catch(e => console.log("Audio failed:", e));
        }

        init();
    </script>
</body>

</html>
